<!DOCTYPE html>
<html>
<head>
    <title>AI Tool Assistance</title>
</head>
<link rel="stylesheet" href="./css/index-css.css">
<body>
    <h1>AI Tool Assistance</h1>

    <div>
        <select id="provider">
            <option value="gemini">Gemini</option>
            <option value="openrouter">OpenRouter</option>
        </select>
    </div>

    <div>
        <select id="tool">
            <option value="resume">Resume Enhancer</option>
            <option value="email">Email Generator</option>
            <option value="blog">Blog Title Generator</option>
            <option value="study">Study Notes</option>
            <option value="malaysian-gibberish">Malaysian Gibberish</option>
        </select>
    </div>

    <div>
        <textarea id="prompt" rows="3" placeholder="Enter your prompt..."></textarea>
    </div>
    <div>
        <button id="generateBtn">Generate</button>
    </div>
    <div>
        <button id="historyBtn">See History</button>
    </div>
    <div>
        <button id="clearBtn">Clear History</button>
    </div>

    <pre id="result"></pre>

    <script type="module" src="app.js"></script>
</body>
</html>
